name: "CI — 纪程"

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-locale:
    name: "验证翻译文件"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 检查 key 一致性
        run: |
          python3 -c "
          import json
          en = json.load(open('apps/desktop/src/lib/i18n/locales/en.json'))
          zh = json.load(open('apps/desktop/src/lib/i18n/locales/zh-CN.json'))
          ek = set(en.keys()); zk = set(zh.keys())
          assert ek == zk, f'Mismatch! en={len(ek)} zh={len(zk)}'
          print(f'OK: {len(ek)} keys match')
          "

  validate-integrity:
    name: "项目完整性检查"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 完整性检查
        run: python3 scripts/check-project-integrity.py

  validate-config:
    name: "验证配置文件"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证 JSON/YAML/Shell
        run: bash scripts/validate-all.sh

  test-shell:
    name: "Shell 脚本冒烟测试"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell 语法+逻辑测试
        run: bash scripts/test-shell.sh

  smoke-test:
    name: "浏览器冒烟测试"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - name: 安装依赖
        run: pnpm install
      - name: 构建前端
        run: pnpm build:desktop
      - name: 安装 Playwright
        run: pip install playwright && npx playwright install chromium 2>/dev/null || true
      - name: 冒烟测试
        run: python3 scripts/e2e-smoke-test.py

  build-check:
    name: "构建检查"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10.20.0
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: TypeScript 检查
        run: pnpm check
        continue-on-error: true
