name: "Rust 编译检查"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-check:
    name: "但-gitee + 但-forge"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libdbus-1-dev

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 编译检查
        run: cargo check -p but-gitee -p but-forge 2>&1
